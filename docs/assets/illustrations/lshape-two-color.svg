<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 500" role="img" aria-labelledby="title desc">
  <title id="title">L-shaped apartment floor plan with two-color grouping</title>
  <desc id="desc">A one-level L-shaped apartment floor plan. Entry, Hallway, and Kitchen are Group A. Living Room, Bedroom, Bathroom, and Dining Area are Group B. Gray connection lines are overlaid between connected areas.</desc>
  <style>
    text { font-family: Arial, Helvetica, sans-serif; fill: #24313d; }
    .shell { fill: #ffffff; stroke: #4c5966; stroke-width: 8; stroke-linejoin: round; }
    .room { stroke: #4c5966; stroke-width: 4; rx: 12; }
    .room-a { fill: #d9f3f0; stroke: #1b8a87; }
    .room-b { fill: #ffe4b8; stroke: #c77713; }
    .wall-line { stroke: #4c5966; stroke-width: 4; stroke-linecap: round; fill: none; }
    .connection { stroke: #7d8791; stroke-width: 5; stroke-linecap: round; fill: none; opacity: .9; }
    .door { stroke: #f8fafc; stroke-width: 12; stroke-linecap: round; fill: none; }
    .label { font-size: 21px; font-weight: 700; }
    .group-label { font-size: 30px; font-weight: 800; fill: #172533; }
    .round-label { font-size: 18px; font-weight: 700; fill: #5d6b7a; }
    .draw-in { stroke-dasharray: 950; stroke-dashoffset: 950; animation: draw 1s ease forwards; }
    .connection.draw-in { animation-delay: .8s; }
    .paint-a { animation: paintA .7s ease 1.7s both; }
    .paint-b { animation: paintB .7s ease 2.45s both; }
    .pulse-a { animation: pulseA 1s ease 3.2s 2; }
    .pulse-b { animation: pulseB 1s ease 4.4s 2; }
    @keyframes draw { to { stroke-dashoffset: 0; } }
    @keyframes paintA { from { fill: #fff; } to { fill: #d9f3f0; } }
    @keyframes paintB { from { fill: #fff; } to { fill: #ffe4b8; } }
    @keyframes pulseA { 50% { stroke-width: 8; filter: drop-shadow(0 0 6px #1b8a87); } }
    @keyframes pulseB { 50% { stroke-width: 8; filter: drop-shadow(0 0 6px #c77713); } }
    @media (prefers-reduced-motion: reduce) {
      .draw-in, .paint-a, .paint-b, .pulse-a, .pulse-b { animation: none; stroke-dashoffset: 0; }
    }
  </style>

  <rect width="760" height="500" fill="#f8fafc"/>
  <text x="36" y="42" class="label">L-shaped apartment</text>

  <g aria-label="One-level L-shaped apartment floor plan">
    <path d="M58 88H650V292H506V436H58Z" class="shell wall-line draw-in"/>

    <rect x="58" y="292" width="154" height="144" class="room room-a paint-a pulse-a"/>
    <rect x="212" y="204" width="178" height="232" class="room room-b paint-b pulse-b"/>
    <rect x="390" y="204" width="116" height="232" class="room room-a paint-a pulse-a"/>
    <rect x="390" y="88" width="116" height="116" class="room room-b paint-b pulse-b"/>
    <rect x="506" y="88" width="144" height="204" class="room room-b paint-b pulse-b"/>
    <rect x="212" y="88" width="178" height="116" class="room room-a paint-a pulse-a"/>
    <rect x="58" y="88" width="154" height="116" class="room room-b paint-b pulse-b"/>

    <path d="M212 88V436 M390 88V436 M506 88V436 M58 204H650 M58 292H506" class="wall-line draw-in"/>

    <line x1="212" y1="342" x2="212" y2="382" class="door"/>
    <line x1="390" y1="286" x2="390" y2="326" class="door"/>
    <line x1="430" y1="204" x2="470" y2="204" class="door"/>
    <line x1="430" y1="292" x2="470" y2="292" class="door"/>
    <line x1="262" y1="204" x2="302" y2="204" class="door"/>
    <line x1="212" y1="126" x2="212" y2="166" class="door"/>

    <line x1="135" y1="364" x2="301" y2="320" class="connection draw-in"/>
    <line x1="301" y1="320" x2="448" y2="320" class="connection draw-in"/>
    <line x1="448" y1="320" x2="448" y2="146" class="connection draw-in"/>
    <line x1="448" y1="320" x2="578" y2="190" class="connection draw-in"/>
    <line x1="301" y1="320" x2="301" y2="146" class="connection draw-in"/>
    <line x1="301" y1="146" x2="135" y2="146" class="connection draw-in"/>

    <text x="94" y="354" class="label">Entry</text>
    <text x="126" y="390" class="group-label">A</text>
    <text x="236" y="310" class="label">Living Room</text>
    <text x="292" y="348" class="group-label">B</text>
    <text x="410" y="310" class="label">Hallway</text>
    <text x="440" y="348" class="group-label">A</text>
    <text x="406" y="136" class="label">Bedroom</text>
    <text x="440" y="174" class="group-label">B</text>
    <text x="540" y="180" class="label">Bathroom</text>
    <text x="570" y="218" class="group-label">B</text>
    <text x="254" y="136" class="label">Kitchen</text>
    <text x="292" y="174" class="group-label">A</text>
    <text x="85" y="128" class="label">Dining</text>
    <text x="94" y="154" class="label">Area</text>
    <text x="126" y="174" class="group-label">B</text>
  </g>

  <text x="58" y="468" class="round-label">Round 1: Group A target areas  |  Round 2: Group B target areas</text>
</svg>
