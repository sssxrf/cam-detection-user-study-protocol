<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 460" role="img" aria-labelledby="title desc">
  <title id="title">L-shaped apartment two-color grouping</title>
  <desc id="desc">An L-shaped apartment where Entry, Hallway, and Kitchen are Group A, while Living Room, Bedroom, Bathroom, and Dining Area are Group B.</desc>
  <style>
    :root { color-scheme: light; }
    text { font-family: Arial, Helvetica, sans-serif; fill: #24313d; }
    .wall { fill: #fff; stroke: #aab5bf; stroke-width: 5; rx: 18; }
    .area-a { fill: #d9f3f0; stroke: #1b8a87; }
    .area-b { fill: #ffe4b8; stroke: #c77713; }
    .node-a { fill: #d9f3f0; stroke: #1b8a87; }
    .node-b { fill: #ffe4b8; stroke: #c77713; }
    .connection { stroke: #9099a3; stroke-width: 6; stroke-linecap: round; fill: none; }
    .label { font-size: 18px; font-weight: 700; }
    .group-mark { font-size: 22px; font-weight: 800; fill: #172533; }
    .small { font-size: 15px; fill: #5d6b7a; }
    .draw-in { stroke-dasharray: 650; stroke-dashoffset: 650; animation: draw 1s ease forwards; }
    .edge-delay { animation-delay: .8s; }
    .paint-a { animation: paintA .7s ease 1.7s both; }
    .paint-b { animation: paintB .7s ease 2.45s both; }
    .round-a { animation: pulseA 1s ease 3.2s 2; }
    .round-b { animation: pulseB 1s ease 4.4s 2; }
    @keyframes draw { to { stroke-dashoffset: 0; } }
    @keyframes paintA { from { fill: #fff; } to { fill: #d9f3f0; } }
    @keyframes paintB { from { fill: #fff; } to { fill: #ffe4b8; } }
    @keyframes pulseA { 50% { stroke-width: 9; filter: drop-shadow(0 0 5px #1b8a87); } }
    @keyframes pulseB { 50% { stroke-width: 9; filter: drop-shadow(0 0 5px #c77713); } }
    @media (prefers-reduced-motion: reduce) {
      .draw-in, .paint-a, .paint-b, .round-a, .round-b { animation: none; stroke-dashoffset: 0; }
    }
  </style>

  <rect width="920" height="460" fill="#f8fafc"/>
  <text x="34" y="42" class="label">Floor plan</text>
  <text x="522" y="42" class="label">Connection graph</text>

  <g aria-label="Simplified L-shaped apartment floor plan">
    <rect x="36" y="270" width="120" height="84" class="wall area-a paint-a round-a"/>
    <text x="66" y="305" class="label">Entry</text>
    <text x="87" y="335" class="group-mark">A</text>

    <rect x="184" y="218" width="150" height="136" class="wall area-b paint-b round-b"/>
    <text x="234" y="277" class="label">Living</text>
    <text x="250" y="310" class="group-mark">B</text>

    <rect x="362" y="218" width="114" height="136" class="wall area-a paint-a round-a"/>
    <text x="388" y="277" class="label">Hallway</text>
    <text x="410" y="310" class="group-mark">A</text>

    <rect x="362" y="78" width="114" height="96" class="wall area-b paint-b round-b"/>
    <text x="389" y="118" class="label">Bedroom</text>
    <text x="410" y="150" class="group-mark">B</text>

    <rect x="362" y="370" width="114" height="66" class="wall area-b paint-b round-b"/>
    <text x="377" y="400" class="label">Bathroom</text>
    <text x="410" y="424" class="group-mark">B</text>

    <rect x="184" y="78" width="150" height="96" class="wall area-a paint-a round-a"/>
    <text x="231" y="118" class="label">Kitchen</text>
    <text x="250" y="150" class="group-mark">A</text>

    <rect x="36" y="78" width="120" height="96" class="wall area-b paint-b round-b"/>
    <text x="62" y="118" class="label">Dining</text>
    <text x="87" y="150" class="group-mark">B</text>

    <line x1="156" y1="312" x2="184" y2="312" class="connection draw-in"/>
    <line x1="334" y1="286" x2="362" y2="286" class="connection draw-in"/>
    <line x1="419" y1="218" x2="419" y2="174" class="connection draw-in"/>
    <line x1="419" y1="354" x2="419" y2="370" class="connection draw-in"/>
    <line x1="259" y1="218" x2="259" y2="174" class="connection draw-in"/>
    <line x1="184" y1="126" x2="156" y2="126" class="connection draw-in"/>
  </g>

  <g aria-label="L-shaped apartment connection graph">
    <line x1="560" y1="320" x2="668" y2="248" class="connection draw-in edge-delay"/>
    <line x1="668" y1="248" x2="790" y2="248" class="connection draw-in edge-delay"/>
    <line x1="790" y1="248" x2="832" y2="120" class="connection draw-in edge-delay"/>
    <line x1="790" y1="248" x2="832" y2="370" class="connection draw-in edge-delay"/>
    <line x1="668" y1="248" x2="628" y2="112" class="connection draw-in edge-delay"/>
    <line x1="628" y1="112" x2="536" y2="112" class="connection draw-in edge-delay"/>

    <circle cx="560" cy="320" r="42" class="node-a paint-a round-a"/>
    <text x="540" y="316" class="small">Entry</text>
    <text x="552" y="342" class="group-mark">A</text>

    <circle cx="668" cy="248" r="46" class="node-b paint-b round-b"/>
    <text x="647" y="244" class="small">Living</text>
    <text x="660" y="270" class="group-mark">B</text>

    <circle cx="790" cy="248" r="46" class="node-a paint-a round-a"/>
    <text x="763" y="244" class="small">Hallway</text>
    <text x="782" y="270" class="group-mark">A</text>

    <circle cx="832" cy="120" r="44" class="node-b paint-b round-b"/>
    <text x="803" y="116" class="small">Bedroom</text>
    <text x="824" y="142" class="group-mark">B</text>

    <circle cx="832" cy="370" r="44" class="node-b paint-b round-b"/>
    <text x="800" y="366" class="small">Bathroom</text>
    <text x="824" y="392" class="group-mark">B</text>

    <circle cx="628" cy="112" r="44" class="node-a paint-a round-a"/>
    <text x="600" y="108" class="small">Kitchen</text>
    <text x="620" y="134" class="group-mark">A</text>

    <circle cx="536" cy="112" r="42" class="node-b paint-b round-b"/>
    <text x="514" y="108" class="small">Dining</text>
    <text x="528" y="134" class="group-mark">B</text>
  </g>
</svg>
