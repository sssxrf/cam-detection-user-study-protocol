<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 360" role="img" aria-labelledby="title desc">
  <title id="title">Quick apartment floor plan with two detection rounds</title>
  <desc id="desc">A simple apartment floor plan. Entry, Bedroom, and Living Room are Group A. Hallway and Kitchen are Group B. Gray connection lines show connected areas, and labels show Round 1 for Group A and Round 2 for Group B.</desc>
  <style>
    text { font-family: Arial, Helvetica, sans-serif; fill: #24313d; }
    .shell { fill: #ffffff; stroke: #4c5966; stroke-width: 8; stroke-linejoin: round; }
    .room { stroke: #4c5966; stroke-width: 4; rx: 12; }
    .room-a { fill: #d9f3f0; stroke: #1b8a87; }
    .room-b { fill: #ffe4b8; stroke: #c77713; }
    .wall-line { stroke: #4c5966; stroke-width: 4; stroke-linecap: round; fill: none; }
    .connection { stroke: #7d8791; stroke-width: 5; stroke-linecap: round; fill: none; opacity: .9; }
    .door { stroke: #f8fafc; stroke-width: 12; stroke-linecap: round; fill: none; }
    .label { font-size: 20px; font-weight: 700; }
    .group-label { font-size: 28px; font-weight: 800; fill: #172533; }
    .round-text { font-size: 20px; font-weight: 800; }
    .badge-a { fill: #d9f3f0; stroke: #1b8a87; stroke-width: 3; rx: 12; }
    .badge-b { fill: #ffe4b8; stroke: #c77713; stroke-width: 3; rx: 12; }
    .draw-in { stroke-dasharray: 760; stroke-dashoffset: 760; animation: draw .9s ease forwards; }
    .connection.draw-in { animation-delay: .8s; }
    .paint-a { animation: paintA .7s ease 1.5s both; }
    .paint-b { animation: paintB .7s ease 2.1s both; }
    .pulse-a { animation: pulseA 1s ease 2.8s 2; }
    .pulse-b { animation: pulseB 1s ease 3.9s 2; }
    @keyframes draw { to { stroke-dashoffset: 0; } }
    @keyframes paintA { from { fill: #fff; } to { fill: #d9f3f0; } }
    @keyframes paintB { from { fill: #fff; } to { fill: #ffe4b8; } }
    @keyframes pulseA { 50% { stroke-width: 8; filter: drop-shadow(0 0 6px #1b8a87); } }
    @keyframes pulseB { 50% { stroke-width: 8; filter: drop-shadow(0 0 6px #c77713); } }
    @media (prefers-reduced-motion: reduce) {
      .draw-in, .paint-a, .paint-b, .pulse-a, .pulse-b { animation: none; stroke-dashoffset: 0; }
    }
  </style>

  <rect width="760" height="360" fill="#f8fafc"/>
  <text x="34" y="40" class="label">Simple apartment grouping</text>

  <g aria-label="Compact apartment floor plan">
    <rect x="40" y="64" width="500" height="236" class="shell wall-line draw-in"/>

    <rect x="40" y="190" width="126" height="110" class="room room-a paint-a pulse-a"/>
    <rect x="166" y="64" width="120" height="236" class="room room-b paint-b pulse-b"/>
    <rect x="286" y="64" width="124" height="104" class="room room-a paint-a pulse-a"/>
    <rect x="286" y="168" width="124" height="132" class="room room-a paint-a pulse-a"/>
    <rect x="410" y="168" width="130" height="132" class="room room-b paint-b pulse-b"/>

    <path d="M166 64V300 M286 64V300 M286 168H540 M410 168V300" class="wall-line draw-in"/>

    <line x1="166" y1="230" x2="166" y2="264" class="door"/>
    <line x1="286" y1="102" x2="286" y2="136" class="door"/>
    <line x1="286" y1="214" x2="286" y2="250" class="door"/>
    <line x1="410" y1="214" x2="410" y2="250" class="door"/>

    <line x1="103" y1="245" x2="226" y2="182" class="connection draw-in"/>
    <line x1="226" y1="182" x2="348" y2="116" class="connection draw-in"/>
    <line x1="226" y1="182" x2="348" y2="234" class="connection draw-in"/>
    <line x1="348" y1="234" x2="475" y2="234" class="connection draw-in"/>

    <text x="74" y="235" class="label">Entry</text>
    <text x="95" y="270" class="group-label">A</text>
    <text x="188" y="171" class="label">Hallway</text>
    <text x="218" y="209" class="group-label">B</text>
    <text x="312" y="110" class="label">Bedroom</text>
    <text x="340" y="145" class="group-label">A</text>
    <text x="308" y="216" class="label">Living</text>
    <text x="312" y="240" class="label">Room</text>
    <text x="340" y="263" class="group-label">A</text>
    <text x="440" y="225" class="label">Kitchen</text>
    <text x="468" y="263" class="group-label">B</text>
  </g>

  <g aria-label="Detection rounds">
    <rect x="578" y="100" width="146" height="64" class="badge-a pulse-a"/>
    <text x="604" y="126" class="round-text">Round 1</text>
    <text x="606" y="150" class="label">Group A</text>
    <rect x="578" y="192" width="146" height="64" class="badge-b pulse-b"/>
    <text x="604" y="218" class="round-text">Round 2</text>
    <text x="606" y="242" class="label">Group B</text>
  </g>
</svg>
