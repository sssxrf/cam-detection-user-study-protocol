<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 300" role="img" aria-labelledby="title desc">
  <title id="title">Quick two-round grouping idea</title>
  <desc id="desc">Three panels show setting up areas, coloring connected areas into Group A and Group B, and testing Group A in Round 1 and Group B in Round 2.</desc>
  <style>
    :root { color-scheme: light; }
    text { font-family: Arial, Helvetica, sans-serif; fill: #24313d; }
    .panel { fill: #fff; stroke: #d8e1ea; stroke-width: 2; rx: 18; }
    .room { fill: #fff; stroke: #aab5bf; stroke-width: 4; rx: 14; }
    .group-a { fill: #d9f3f0; stroke: #1b8a87; }
    .group-b { fill: #ffe4b8; stroke: #c77713; }
    .connection { stroke: #9099a3; stroke-width: 5; stroke-linecap: round; }
    .title { font-size: 20px; font-weight: 800; }
    .label { font-size: 16px; font-weight: 700; }
    .mark { font-size: 20px; font-weight: 800; fill: #172533; }
    .round { fill: #f8fafc; stroke: #d8e1ea; stroke-width: 2; rx: 12; }
    .draw-in { stroke-dasharray: 240; stroke-dashoffset: 240; animation: draw .9s ease forwards; }
    .paint-a { animation: paintA .7s ease 1.1s both; }
    .paint-b { animation: paintB .7s ease 1.7s both; }
    .pulse-a { animation: pulseA 1s ease 2.4s 2; }
    .pulse-b { animation: pulseB 1s ease 3.5s 2; }
    @keyframes draw { to { stroke-dashoffset: 0; } }
    @keyframes paintA { from { fill: #fff; } to { fill: #d9f3f0; } }
    @keyframes paintB { from { fill: #fff; } to { fill: #ffe4b8; } }
    @keyframes pulseA { 50% { stroke-width: 8; filter: drop-shadow(0 0 5px #1b8a87); } }
    @keyframes pulseB { 50% { stroke-width: 8; filter: drop-shadow(0 0 5px #c77713); } }
    @media (prefers-reduced-motion: reduce) {
      .draw-in, .paint-a, .paint-b, .pulse-a, .pulse-b { animation: none; stroke-dashoffset: 0; }
    }
  </style>

  <rect width="920" height="300" fill="#f8fafc"/>

  <g aria-label="Panel one set up areas">
    <rect x="24" y="26" width="270" height="248" class="panel"/>
    <text x="48" y="62" class="title">1. You set up areas</text>
    <rect x="56" y="92" width="84" height="60" class="room"/>
    <rect x="154" y="92" width="84" height="60" class="room"/>
    <rect x="56" y="170" width="84" height="60" class="room"/>
    <rect x="154" y="170" width="84" height="60" class="room"/>
    <text x="78" y="127" class="label">Bed</text>
    <text x="174" y="127" class="label">Hall</text>
    <text x="72" y="205" class="label">Bath</text>
    <text x="174" y="205" class="label">Kitchen</text>
  </g>

  <g aria-label="Panel two color connected areas">
    <rect x="324" y="26" width="270" height="248" class="panel"/>
    <text x="348" y="62" class="title">2. The app colors links</text>
    <line x1="428" y1="122" x2="486" y2="122" class="connection draw-in"/>
    <line x1="486" y1="122" x2="428" y2="200" class="connection draw-in"/>
    <line x1="486" y1="122" x2="486" y2="200" class="connection draw-in"/>
    <rect x="356" y="92" width="72" height="60" class="room group-a paint-a pulse-a"/>
    <rect x="486" y="92" width="72" height="60" class="room group-b paint-b pulse-b"/>
    <rect x="356" y="170" width="72" height="60" class="room group-a paint-a pulse-a"/>
    <rect x="486" y="170" width="72" height="60" class="room group-a paint-a pulse-a"/>
    <text x="384" y="128" class="mark">A</text>
    <text x="514" y="128" class="mark">B</text>
    <text x="384" y="206" class="mark">A</text>
    <text x="514" y="206" class="mark">A</text>
  </g>

  <g aria-label="Panel three run two rounds">
    <rect x="624" y="26" width="270" height="248" class="panel"/>
    <text x="648" y="62" class="title">3. The app runs rounds</text>
    <rect x="666" y="104" width="184" height="54" class="round pulse-a"/>
    <text x="692" y="138" class="label">Round 1: Group A</text>
    <rect x="666" y="176" width="184" height="54" class="round pulse-b"/>
    <text x="692" y="210" class="label">Round 2: Group B</text>
    <circle cx="684" cy="131" r="10" fill="#1b8a87"/>
    <circle cx="684" cy="203" r="10" fill="#c77713"/>
  </g>
</svg>
