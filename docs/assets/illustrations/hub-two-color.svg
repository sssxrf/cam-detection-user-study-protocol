<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 500" role="img" aria-labelledby="title desc">
  <title id="title">Central hallway apartment floor plan with two-color grouping</title>
  <desc id="desc">A one-level apartment floor plan with a central hallway. Hallway is Group A. Bedroom, Bathroom, Office, Living Room, and Kitchen are Group B. Gray connection lines are overlaid from the hallway to each connected area.</desc>
  <style>
    text { font-family: Arial, Helvetica, sans-serif; fill: #24313d; }
    .shell { fill: #ffffff; stroke: #4c5966; stroke-width: 8; stroke-linejoin: round; }
    .room { stroke: #4c5966; stroke-width: 4; rx: 12; }
    .room-a { fill: #d9f3f0; stroke: #1b8a87; }
    .room-b { fill: #ffe4b8; stroke: #c77713; }
    .wall-line { stroke: #4c5966; stroke-width: 4; stroke-linecap: round; fill: none; }
    .connection { stroke: #7d8791; stroke-width: 5; stroke-linecap: round; fill: none; opacity: .9; }
    .door { stroke: #f8fafc; stroke-width: 12; stroke-linecap: round; fill: none; }
    .label { font-size: 21px; font-weight: 700; }
    .group-label { font-size: 30px; font-weight: 800; fill: #172533; }
    .round-label { font-size: 18px; font-weight: 700; fill: #5d6b7a; }
    .draw-in { stroke-dasharray: 900; stroke-dashoffset: 900; animation: draw 1s ease forwards; }
    .connection.draw-in { animation-delay: .8s; }
    .paint-a { animation: paintA .7s ease 1.7s both; }
    .paint-b { animation: paintB .7s ease 2.45s both; }
    .pulse-a { animation: pulseA 1s ease 3.2s 2; }
    .pulse-b { animation: pulseB 1s ease 4.4s 2; }
    @keyframes draw { to { stroke-dashoffset: 0; } }
    @keyframes paintA { from { fill: #fff; } to { fill: #d9f3f0; } }
    @keyframes paintB { from { fill: #fff; } to { fill: #ffe4b8; } }
    @keyframes pulseA { 50% { stroke-width: 8; filter: drop-shadow(0 0 6px #1b8a87); } }
    @keyframes pulseB { 50% { stroke-width: 8; filter: drop-shadow(0 0 6px #c77713); } }
    @media (prefers-reduced-motion: reduce) {
      .draw-in, .paint-a, .paint-b, .pulse-a, .pulse-b { animation: none; stroke-dashoffset: 0; }
    }
  </style>

  <rect width="760" height="500" fill="#f8fafc"/>
  <text x="36" y="42" class="label">Central hallway apartment</text>

  <g aria-label="One-level central hallway apartment floor plan">
    <rect x="64" y="76" width="632" height="360" class="shell wall-line draw-in"/>

    <rect x="250" y="190" width="210" height="122" class="room room-a paint-a pulse-a"/>
    <rect x="64" y="76" width="186" height="114" class="room room-b paint-b pulse-b"/>
    <rect x="250" y="76" width="210" height="114" class="room room-b paint-b pulse-b"/>
    <rect x="460" y="76" width="236" height="178" class="room room-b paint-b pulse-b"/>
    <rect x="64" y="312" width="186" height="124" class="room room-b paint-b pulse-b"/>
    <rect x="250" y="312" width="446" height="124" class="room room-b paint-b pulse-b"/>

    <path d="M250 76V436 M460 76V312 M64 190H696 M64 312H696" class="wall-line draw-in"/>

    <line x1="304" y1="190" x2="344" y2="190" class="door"/>
    <line x1="250" y1="232" x2="250" y2="272" class="door"/>
    <line x1="460" y1="220" x2="460" y2="254" class="door"/>
    <line x1="304" y1="312" x2="344" y2="312" class="door"/>
    <line x1="414" y1="312" x2="454" y2="312" class="door"/>

    <line x1="355" y1="251" x2="157" y2="133" class="connection draw-in"/>
    <line x1="355" y1="251" x2="355" y2="133" class="connection draw-in"/>
    <line x1="355" y1="251" x2="578" y2="165" class="connection draw-in"/>
    <line x1="355" y1="251" x2="157" y2="374" class="connection draw-in"/>
    <line x1="355" y1="251" x2="473" y2="374" class="connection draw-in"/>

    <text x="314" y="242" class="label">Hallway</text>
    <text x="346" y="280" class="group-label">A</text>
    <text x="105" y="125" class="label">Bedroom</text>
    <text x="148" y="162" class="group-label">B</text>
    <text x="306" y="125" class="label">Bathroom</text>
    <text x="346" y="162" class="group-label">B</text>
    <text x="520" y="155" class="label">Living Room</text>
    <text x="586" y="193" class="group-label">B</text>
    <text x="119" y="366" class="label">Office</text>
    <text x="148" y="402" class="group-label">B</text>
    <text x="430" y="366" class="label">Kitchen</text>
    <text x="468" y="402" class="group-label">B</text>
  </g>

  <text x="64" y="468" class="round-label">Round 1: Group A target areas  |  Round 2: Group B target areas</text>
</svg>
